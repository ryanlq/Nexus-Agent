name: Test Build

on:
  push:
    branches: [main, release/*]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            build-cmd: npm run dist:mac
            artifact-name: nexus-agent-macos
            artifact-path: |
              release/*.dmg
              release/*.zip
          - platform: windows
            runner: windows-latest
            build-cmd: npm run dist:win
            artifact-name: nexus-agent-windows
            artifact-path: |
              release/*.exe
              release/*.msi
              release/*.blockmap
          - platform: linux
            runner: ubuntu-latest
            build-cmd: npm run dist:linux
            artifact-name: nexus-agent-linux
            artifact-path: |
              release/*.AppImage
              release/*.deb
              release/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux build toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 python3-setuptools \
            libx11-dev libxkbfile-dev libsecret-1-dev \
            libfontconfig-dev libfreetype6-dev \
            rpm fakeroot dpkg libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000

      - name: Build + package (${{ matrix.platform }})
        run: ${{ matrix.build-cmd }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        shell: bash
        run: ls -lah release || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: warn
          retention-days: 30
