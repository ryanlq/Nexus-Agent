# Cross-platform release build for Nexus Agent Desktop.
#
# Triggers:
#   - Every `v*` tag push (e.g. v0.15.1, v1.0.0-beta.1)
#   - Manual dispatch from the Actions tab (for testing the pipeline without a tag)
#
# What it does:
#   1. Builds the Electron app in parallel on macOS / Windows / Linux runners
#      using the existing `npm run dist:<platform>` scripts (electron-builder).
#   2. Uploads each matrix leg's installers as a workflow artifact (retained
#      for 30 days, useful for debugging failed builds).
#   3. After all three builds succeed, downloads every artifact, generates a
#      SHA-256 manifest, drafts a GitHub Release on this repo, and attaches
#      all installers + the manifest.
#
# Notes:
#   - macOS builds are NOT notarised by default. To enable notarisation, add
#     the Apple signing secrets below and the `scripts/notarize.cjs` hook will
#     pick them up automatically. Without them the build produces an unsigned
#     DMG + ZIP that can still be distributed internally / via direct download.
#   - Windows builds are not EV-signed. `signAndEditExecutable: false` is
#     already set in package.json, so NSIS + MSI are produced without a cert.
#   - Linux builds produce AppImage + deb + rpm on the ubuntu-latest runner.
#
# Required repo settings (Settings -> Actions -> General):
#   - "Read and write permissions" for workflows (so `gh release create` works)
#
# Optional secrets (only needed for signed / notarised builds):
#   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#   CSC_LINK, CSC_KEY_PASSWORD                (Apple Developer ID .p12)
#   WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD        (Windows code-signing .pfx)

name: Release

on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build (defaults to the dispatch ref)'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write     # needed for `gh release create` + uploading release assets
  actions: read
  attestations: read

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'
  # Electron + Chromium download mirror (opt-in, speeds up the first build in
  # some regions). Remove if the default CDN works for your runners.
  # ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            build-cmd: npm run dist:mac
            artifact-name: nexus-agent-macos
            artifact-path: release/*.{dmg,zip}
          - platform: windows
            runner: windows-latest
            build-cmd: npm run dist:win
            artifact-name: nexus-agent-windows
            artifact-path: release/*.{exe,msi,blockmap}
          - platform: linux
            runner: ubuntu-latest
            build-cmd: npm run dist:linux
            artifact-name: nexus-agent-linux
            artifact-path: release/*.{AppImage,deb,rpm}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # electron-builder sometimes wants the full git history for versioning

      - name: Install Linux build toolchain (node-gyp, FUSE for AppImage)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 python3-setuptools \
            libx11-dev libxkbfile-dev libsecret-1-dev \
            libfontconfig-dev libfreetype6-dev \
            rpm fakeroot dpkg libfuse2

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python ${{ env.PYTHON_VERSION }} (node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: npm ci
        env:
          # node-pty rebuilds from source; tolerate slow mirrors rather than failing.
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000

      - name: Build + package (${{ matrix.platform }})
        run: ${{ matrix.build-cmd }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Apple signing / notarisation (ignored if secrets are absent) ──
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_FOR_PULL_REQUEST: 'false'
          # ── Windows signing (ignored if secrets are absent) ──
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: List build artifacts
        shell: bash
        run: |
          echo "Contents of release/ directory:"
          ls -lah release || true

      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: nexus-agent-*
          merge-multiple: true

      - name: Generate SHA-256 manifest
        working-directory: release-artifacts
        run: |
          set -euo pipefail
          ls -lah
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS.txt
          else
            shasum -a 256 * > SHA256SUMS.txt
          fi
          echo "----- SHA256SUMS.txt -----"
          cat SHA256SUMS.txt

      - name: Derive release name
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          # Strip leading 'v' for the human-readable title, keep the tag verbatim for the asset filenames.
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Nexus Agent Desktop ${{ steps.meta.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          echo "### Nexus Agent Desktop ${{ steps.meta.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Release published at: https://github.com/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -1 release-artifacts >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
