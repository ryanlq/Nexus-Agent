name: Release

on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.11'
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS temporarily disabled — extraResources path issue on CI
          # - platform: macos
          #   runner: macos-latest
          #   build-cmd: npm run dist:mac
          #   artifact-name: nexus-agent-macos
          #   artifact-path: |
          #     release/*.dmg
          #     release/*.zip
          - platform: windows
            runner: windows-latest
            build-cmd: npm run dist:win
            artifact-name: nexus-agent-windows
            artifact-path: |
              release/*.exe
              release/*.msi
              release/*.blockmap
          - platform: linux
            runner: ubuntu-latest
            build-cmd: npm run dist:linux
            artifact-name: nexus-agent-linux
            artifact-path: |
              release/*.AppImage
              release/*.deb
              release/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux build toolchain (node-gyp, FUSE for AppImage)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 python3-setuptools \
            libx11-dev libxkbfile-dev libsecret-1-dev \
            libfontconfig-dev libfreetype6-dev \
            rpm fakeroot dpkg libfuse2

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python ${{ env.PYTHON_VERSION }} (node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000

      - name: Build + package (${{ matrix.platform }})
        run: ${{ matrix.build-cmd }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_FOR_PULL_REQUEST: 'false'
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: List build artifacts
        shell: bash
        run: |
          echo "Contents of release/ directory:"
          ls -lah release || true

      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: nexus-agent-*
          merge-multiple: true

      - name: Generate SHA-256 manifest
        working-directory: release-artifacts
        run: |
          set -euo pipefail
          ls -lah
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS.txt
          else
            shasum -a 256 * > SHA256SUMS.txt
          fi
          echo "----- SHA256SUMS.txt -----"
          cat SHA256SUMS.txt

      - name: Derive release name
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Nexus Agent Desktop ${{ steps.meta.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          echo "### Nexus Agent Desktop ${{ steps.meta.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Release published at: https://github.com/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -1 release-artifacts >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
